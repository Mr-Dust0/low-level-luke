<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="monospace" font-size="14">
  <rect width="720" height="400" fill="#1a1a2e" rx="8"/>

  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#53d8fb"/>
    </marker>
    <marker id="arrow2-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4ecca3"/>
    </marker>
    <marker id="arrow2-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f0a500"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="360" y="32" text-anchor="middle" fill="#e0e0e0" font-size="16" font-weight="bold">Shuffled Values Attempt</text>

  <!-- Index labels -->
  <g transform="translate(60, 50)">
    <text x="50" y="12" text-anchor="middle" fill="#888" font-size="11">arr[0]</text>
    <text x="170" y="12" text-anchor="middle" fill="#888" font-size="11">arr[1]</text>
    <text x="290" y="12" text-anchor="middle" fill="#888" font-size="11">arr[2]</text>
    <text x="410" y="12" text-anchor="middle" fill="#888" font-size="11">arr[3]</text>
    <text x="530" y="12" text-anchor="middle" fill="#888" font-size="11">arr[4]</text>
  </g>

  <!-- Array boxes with shuffled values -->
  <g transform="translate(60, 65)">
    <rect x="0" y="0" width="100" height="50" fill="#16213e" stroke="#0f3460" stroke-width="2" rx="4"/>
    <text x="50" y="30" text-anchor="middle" fill="#f0a500" font-size="13">Page 4</text>

    <rect x="120" y="0" width="100" height="50" fill="#16213e" stroke="#0f3460" stroke-width="2" rx="4"/>
    <text x="170" y="30" text-anchor="middle" fill="#f0a500" font-size="13">Page 1</text>

    <rect x="240" y="0" width="100" height="50" fill="#16213e" stroke="#0f3460" stroke-width="2" rx="4"/>
    <text x="290" y="30" text-anchor="middle" fill="#f0a500" font-size="13">Page 7</text>

    <rect x="360" y="0" width="100" height="50" fill="#16213e" stroke="#0f3460" stroke-width="2" rx="4"/>
    <text x="410" y="30" text-anchor="middle" fill="#f0a500" font-size="13">Page 2</text>

    <rect x="480" y="0" width="100" height="50" fill="#16213e" stroke="#0f3460" stroke-width="2" rx="4"/>
    <text x="530" y="30" text-anchor="middle" fill="#f0a500" font-size="13">Page 9</text>
  </g>

  <!-- Sequential access arrows (blue, underneath) -->
  <g transform="translate(60, 65)">
    <path d="M 50 50 Q 50 70 110 70 Q 170 70 170 50" stroke="#53d8fb" stroke-width="2" fill="none" marker-end="url(#arrow2)"/>
    <path d="M 170 50 Q 170 70 230 70 Q 290 70 290 50" stroke="#53d8fb" stroke-width="2" fill="none" marker-end="url(#arrow2)"/>
    <path d="M 290 50 Q 290 70 350 70 Q 410 70 410 50" stroke="#53d8fb" stroke-width="2" fill="none" marker-end="url(#arrow2)"/>
    <path d="M 410 50 Q 410 70 470 70 Q 530 70 530 50" stroke="#53d8fb" stroke-width="2" fill="none" marker-end="url(#arrow2)"/>
  </g>
  <text x="360" y="160" text-anchor="middle" fill="#53d8fb" font-size="12">Access pattern: arr[0] -> arr[1] -> arr[2] -> arr[3] -> arr[4]  (still sequential!)</text>

  <!-- Key insight box -->
  <g transform="translate(80, 175)">
    <rect x="0" y="0" width="560" height="50" fill="#2a2a1a" stroke="#f0a500" stroke-width="2" rx="6"/>
    <text x="280" y="20" text-anchor="middle" fill="#f0a500" font-size="13" font-weight="bold">Values are shuffled, but the access pattern is still linear.</text>
    <text x="280" y="38" text-anchor="middle" fill="#c8a040" font-size="12">The prefetcher watches addresses, not values.</text>
  </g>

  <!-- Prefetcher box -->
  <g transform="translate(80, 245)">
    <rect x="0" y="0" width="560" height="65" fill="#1a3a2e" stroke="#4ecca3" stroke-width="2" rx="6" stroke-dasharray="6,3"/>
    <text x="280" y="22" text-anchor="middle" fill="#4ecca3" font-size="14" font-weight="bold">Hardware Prefetcher</text>
    <text x="280" y="42" text-anchor="middle" fill="#a0d9c0" font-size="12">Addresses still accessed in order. Can read ahead</text>
    <text x="280" y="57" text-anchor="middle" fill="#a0d9c0" font-size="12">and prefetch pages before they're needed.</text>
  </g>

  <!-- Result -->
  <rect x="120" y="335" width="480" height="40" fill="#2a1a1a" stroke="#e94560" stroke-width="1" rx="4"/>
  <text x="360" y="360" text-anchor="middle" fill="#e94560" font-size="14">Result: Still ~34 cycles (prefetcher not fooled)</text>
</svg>
